<html>

<head>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>

<body>
    <section class="pagina-1">
        <img class="logo" src="./images/Logo.png" alt="Logo da empresa">

        <div class="texto">
            <h1>Benefícios que você ganha</h1>
            <ul>
                <li>Alívio da Dor</li>
                <li>Melhora a Postura</li>
                <li>Melhora o Sono</li>
            </ul>
        </div>

        <img class="alivio" src="./images/Massagem.png" alt="Uma Massagem">
    </section>

    <section class="pagina-2">
        <figure class="imagens">
            <img class="figuras" src="./images/massageamento.png" alt="">
            <figcaption class="letras">A massagem ajuda você a relaxar, deixar calmo e maximiza seu bem-estar
            </figcaption>
        </figure>
        <figure class="imagens">
            <img class="figuras" src="./images/quiro.png" alt="">
            <figcaption class="letras">Alguns benefícios da quiropraxia são: Melhora sua postura, ajeita sua postura e
                previne a hernia de disco</figcaption>
        </figure>
    </section>

    <section class="pagina-3">
        <img class="imagens-da-pagina-3" src="./images/Massageamentomental.png">
        <figcaption class="letras">A quiropraxia alivia sua dor e melhora sua mobilidade</figcaption>
    </section>
    <section class="avaliation">
        <h1>
            Avaliações
        </h1>
        <div class="comentario">
            <img src="images/image.png" alt="foto de uma pessoa" class="image-pessoa">
            <span class="frase">
                Melhorou muito minha postura e aliviou muito minha dor.
            </span>
            <div class="stars">
                <img src="./images/Star.png" alt="">
                <img src="./images/Star.png" alt="">
                <img src="./images/Star.png" alt="">
                <img src="./images/Star.png" alt="">
                <img src="./images/Star.png" alt="">
            </div>
        </div>
    </section>
    <section class="agende">
        <h1>
            Agende sua Massagem aqui!
        </h1>
    </section>
    <section class="agendamento">
        <div class="agendar">
            <form id="form-agendamento" class="algumacoisa">
                <label for="">Nome</label>
                <input type="text" id="nome">

                <label for="">Telefone</label>
                <input type="text" id="telefone">

                <button class="envia">Enviar</button>
            </form>
        </div>
    </section>
</body>
</html>
